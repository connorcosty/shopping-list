<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Shop">
<meta name="theme-color" content="#2d5a1b">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<title>Weekly Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:           #faf8f3;
    --surface:      #ffffff;
    --surface2:     #f2efe8;
    --border:       #e4e0d4;
    --accent:       #2d5a1b;
    --accent-mid:   #4a8a2e;
    --accent-light: #eaf3e2;
    --text:         #1a1a16;
    --muted:        #7a7a6a;
    --dim:          #b0ad9e;
    --danger:       #b83030;
    --safe-top:     env(safe-area-inset-top,    44px);
    --safe-bot:     env(safe-area-inset-bottom, 20px);
  }

  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0; padding: 0;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
  }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ─────────────────────────────────── */
  .hdr {
    flex-shrink: 0;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: calc(var(--safe-top) + 10px) 18px 12px;
  }

  .hdr-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .hdr h1 {
    font-family: 'Fraunces', serif;
    font-size: 24px;
    font-weight: 700;
    line-height: 1;
  }

  .hdr h1 em { color: var(--accent); font-style: italic; }

  .menu-btn {
    width: 36px; height: 36px;
    border-radius: 9px;
    border: 1px solid var(--border);
    background: var(--surface);
    font-size: 20px;
    line-height: 36px;
    text-align: center;
    cursor: pointer;
    user-select: none;
  }
  .menu-btn:active { background: var(--surface2); }

  /* tabs */
  .tabs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }

  .tab {
    padding: 9px 0;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    text-align: center;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }

  .tab.on {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* ── PROGRESS ────────────────────────────────── */
  .prog {
    flex-shrink: 0;
    padding: 10px 18px 6px;
    background: var(--bg);
  }

  .prog-row {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--dim);
    margin-bottom: 5px;
  }

  .prog-row span:last-child { color: var(--accent); }

  .prog-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .prog-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.35s ease;
  }

  /* ── SEARCH ──────────────────────────────────── */
  .srch {
    flex-shrink: 0;
    padding: 8px 18px 4px;
    background: var(--bg);
  }

  .srch input {
    width: 100%;
    padding: 9px 13px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--text);
    outline: none;
    -webkit-appearance: none;
  }

  .srch input:focus { border-color: var(--accent-mid); }
  .srch input::placeholder { color: var(--dim); }

  /* ── SCROLL AREA ─────────────────────────────── */
  .scroll {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding-bottom: calc(var(--safe-bot) + 80px);
  }

  /* ── CATEGORY ────────────────────────────────── */
  .cat-lbl {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px 6px;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 5;
    border-bottom: 1px solid var(--border);
  }

  .cat-lbl span:last-child {
    margin-left: auto;
    color: var(--dim);
  }

  /* ── ITEM ROW ─────────────────────────────────── */
  .item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 18px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.1s;
    user-select: none;
  }

  .item:active { background: var(--surface2); }

  .item.done { opacity: 0.4; }

  .item.pantry-stocked {
    background: var(--accent-light);
    opacity: 0.55;
  }

  .cb {
    width: 26px; height: 26px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    transition: all 0.18s;
  }

  .item.done .cb {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  .item.pantry-stocked .cb {
    background: var(--accent-light);
    border-color: var(--accent-mid);
    font-size: 12px;
  }

  .item-name {
    flex: 1;
    font-size: 14px;
    line-height: 1.3;
    color: var(--text);
  }

  .item.done .item-name {
    text-decoration: line-through;
    color: var(--dim);
  }

  .item-qty {
    font-size: 11px;
    color: var(--dim);
    text-align: right;
    flex-shrink: 0;
    max-width: 70px;
  }

  /* ── PANTRY VIEW ──────────────────────────────── */
  .pan-intro {
    padding: 18px 18px 8px;
    border-bottom: 1px solid var(--border);
  }

  .pan-intro h2 {
    font-family: 'Fraunces', serif;
    font-size: 20px;
    font-weight: 300;
    margin-bottom: 5px;
  }

  .pan-intro p {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.6;
  }

  .pan-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 18px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
    transition: background 0.1s;
  }

  .pan-item:active { background: var(--surface2); }

  /* iOS-style toggle */
  .toggle {
    width: 46px; height: 28px;
    border-radius: 14px;
    background: #d0ccc0;
    position: relative;
    flex-shrink: 0;
    transition: background 0.22s;
  }

  .toggle::after {
    content: '';
    position: absolute;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: white;
    top: 3px; left: 3px;
    transition: transform 0.22s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.18);
  }

  .pan-item.on .toggle { background: var(--accent); }
  .pan-item.on .toggle::after { transform: translateX(18px); }

  .pan-name {
    flex: 1;
    font-size: 14px;
    color: var(--text);
  }

  .pan-item.on .pan-name { color: var(--accent); }

  .pan-qty {
    font-size: 11px;
    color: var(--dim);
  }

  /* ── BOTTOM BAR ───────────────────────────────── */
  .bot {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--bg);
    border-top: 1px solid var(--border);
    padding: 10px 18px calc(var(--safe-bot) + 10px);
    display: flex;
    gap: 10px;
    z-index: 50;
  }

  .btn {
    flex: 1;
    padding: 13px 0;
    border-radius: 11px;
    border: none;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .btn:active { opacity: 0.75; }

  .btn-g {
    background: var(--accent);
    color: white;
  }

  .btn-w {
    background: var(--surface);
    color: var(--muted);
    border: 1px solid var(--border);
  }

  /* ── MODAL ────────────────────────────────────── */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 200;
    align-items: flex-end;
  }

  .overlay.open { display: flex; }

  .sheet {
    width: 100%;
    background: var(--bg);
    border-radius: 20px 20px 0 0;
    padding: 16px 18px calc(var(--safe-bot) + 18px);
    animation: up 0.22s ease;
  }

  @keyframes up {
    from { transform: translateY(100%); }
    to   { transform: translateY(0);    }
  }

  .handle {
    width: 36px; height: 4px;
    border-radius: 2px;
    background: var(--border);
    margin: 0 auto 18px;
  }

  .sheet h3 {
    font-family: 'Fraunces', serif;
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 16px;
  }

  .sheet-btn {
    display: block;
    width: 100%;
    padding: 15px 14px;
    border-radius: 11px;
    border: 1px solid var(--border);
    background: var(--surface);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.04em;
    color: var(--text);
    text-align: left;
    cursor: pointer;
    margin-bottom: 8px;
    transition: background 0.12s;
  }

  .sheet-btn:active { background: var(--surface2); }
  .sheet-btn.red { color: var(--danger); }
  .sheet-btn.centre { text-align: center; color: var(--muted); }

  .pan-empty-custom {
    padding: 14px 18px;
    font-size: 12px;
    color: var(--dim);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    font-style: italic;
  }

  .del-btn {
    flex-shrink: 0;
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--danger);
    font-size: 11px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-left: 4px;
    line-height: 1;
  }

  .del-btn:active { background: var(--surface2); }

  /* ── ADD ITEM FORM ────────────────────────────── */
  .add-item-form {
    padding: 18px;
    background: var(--surface);
    border-top: 2px solid var(--accent-light);
    margin-top: 6px;
  }

  .add-form-title {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
    font-weight: 500;
  }

  .add-item-form input,
  .add-item-form select {
    width: 100%;
    padding: 11px 13px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--text);
    outline: none;
    -webkit-appearance: none;
    margin-bottom: 10px;
  }

  .add-item-form input:focus,
  .add-item-form select:focus { border-color: var(--accent-mid); }

  .add-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .add-row input,
  .add-row select { margin-bottom: 0; }

  .add-btn {
    display: block;
    width: 100%;
    margin-top: 12px;
    padding: 14px;
    border-radius: 11px;
    border: none;
    background: var(--accent);
    color: white;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .add-btn:active { opacity: 0.8; }
  .empty {
    padding: 60px 30px;
    text-align: center;
  }

  .empty .e-icon { font-size: 52px; margin-bottom: 14px; }

  .empty h3 {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 300;
    margin-bottom: 8px;
  }

  .empty p { font-size: 12px; color: var(--muted); line-height: 1.65; }

  /* hide pantry bar by default */
  #panBot { display: none; }
</style>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
  <div class="hdr-row">
    <h1>Weekly <em>Shop</em></h1>
    <div class="menu-btn" onclick="openMenu()">···</div>
  </div>
  <div class="tabs">
    <button class="tab on"  id="tabList"   onclick="goTab('list')">🛒 Shopping</button>
    <button class="tab"     id="tabPantry" onclick="goTab('pantry')">🏠 Pantry</button>
  </div>
</header>

<!-- PROGRESS (list only) -->
<div class="prog" id="progWrap">
  <div class="prog-row"><span>Progress</span><span id="progTxt">0 / 0</span></div>
  <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
</div>

<!-- SEARCH (list only) -->
<div class="srch" id="srchWrap">
  <input type="search" placeholder="Search items…" oninput="doFilter(this.value)" autocomplete="off" autocorrect="off" spellcheck="false">
</div>

<!-- SCROLL AREA -->
<div class="scroll" id="scrollArea">
  <!-- rendered by JS -->
</div>

<!-- BOTTOM BAR: list -->
<div class="bot" id="listBot">
  <button class="btn btn-w" onclick="uncheckAll()">Uncheck All</button>
  <button class="btn btn-g" onclick="removeChecked()">Done — Hide</button>
</div>

<!-- BOTTOM BAR: pantry -->
<div class="bot" id="panBot">
  <button class="btn btn-w" onclick="clearPantry()">Clear Pantry</button>
  <button class="btn btn-g" onclick="goTab('list')">← Back to List</button>
</div>

<!-- OPTIONS SHEET -->
<div class="overlay" id="menuOverlay" onclick="overlayTap(event)">
  <div class="sheet">
    <div class="handle"></div>
    <h3>Options</h3>
    <button class="sheet-btn" onclick="resetList(); closeMenu()">↺ Reset Full Weekly List</button>
    <button class="sheet-btn" onclick="copyList(); closeMenu()">⎘ Copy List as Text</button>
    <button class="sheet-btn red" onclick="nukAll(); closeMenu()">⚠ Clear All Data</button>
    <button class="sheet-btn centre" onclick="closeMenu()">Cancel</button>
  </div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────

const CATS = {
  protein: { label: 'Protein',       icon: '🥩' },
  carbs:   { label: 'Carbs',         icon: '🌾' },
  veg:     { label: 'Veg & Fruit',   icon: '🥦' },
  fats:    { label: 'Fats & Extras', icon: '🫙' },
};

const ALL = [
  // Protein
  { id:'chicken',  cat:'protein', name:'Chicken breast',             qty:'~1.4 kg'      },
  { id:'salmon',   cat:'protein', name:'Salmon fillets',             qty:'× 4'          },
  { id:'eggs',     cat:'protein', name:'Large eggs',                 qty:'× 12'         },
  { id:'yoghurt',  cat:'protein', name:'Greek yoghurt 0%',          qty:'4 × 200 g'    },
  { id:'cottage',  cat:'protein', name:'Cottage cheese',             qty:'2 × 500 g'    },
  { id:'sardines', cat:'protein', name:'Tinned sardines / mackerel', qty:'× 3 tins'     },
  { id:'whey',     cat:'protein', name:'Whey protein (optional)',    qty:'1 tub'        },
  // Carbs
  { id:'oats',     cat:'carbs',   name:'Rolled oats',                qty:'large bag'    },
  { id:'rice',     cat:'carbs',   name:'Brown rice',                 qty:'1 kg bag'     },
  { id:'sweetpot', cat:'carbs',   name:'Sweet potatoes',             qty:'× 6'          },
  { id:'bread',    cat:'carbs',   name:'Wholegrain bread',           qty:'1 loaf'       },
  { id:'bananas',  cat:'carbs',   name:'Bananas',                    qty:'× 8+'         },
  // Veg
  { id:'berries',  cat:'veg',     name:'Frozen mixed berries',       qty:'1 kg bag'     },
  { id:'broccoli', cat:'veg',     name:'Broccoli',                   qty:'× 2 heads'    },
  { id:'spinach',  cat:'veg',     name:'Spinach',                    qty:'1 bag'        },
  { id:'stirfry',  cat:'veg',     name:'Stir-fry mixed veg',         qty:'1 bag'        },
  { id:'tomatoes', cat:'veg',     name:'Tomatoes',                   qty:'handful'      },
  { id:'lemons',   cat:'veg',     name:'Lemons',                     qty:'× 2'          },
  // Fats
  { id:'walnuts',  cat:'fats',    name:'Walnuts',                    qty:'200 g bag'    },
  { id:'pb',       cat:'fats',    name:'Peanut butter',              qty:'1 jar'        },
  { id:'olive',    cat:'fats',    name:'Olive oil',                  qty:'bottle'       },
  { id:'honey',    cat:'fats',    name:'Honey',                      qty:'small jar'    },
  { id:'flax',     cat:'fats',    name:'Flaxseed oil (optional)',     qty:'small bottle' },
  { id:'milk',     cat:'fats',    name:'Semi-skimmed milk',          qty:'2 L'          },
  { id:'soy',      cat:'fats',    name:'Soy sauce / seasoning',      qty:'as needed'    },
];

// ── STATE ─────────────────────────────────────────────────────────────────────

const LS = 'shopV2';

function load()  { try { return JSON.parse(localStorage.getItem(LS) || '{}'); } catch { return {}; } }
function save(s) { localStorage.setItem(LS, JSON.stringify(s)); }

function getArr(key) { const s = load(); return s[key] || []; }
function setArr(key, arr) { const s = load(); s[key] = arr; save(s); }

const checked  = () => getArr('checked');
const removed  = () => getArr('removed');
const pantry   = () => getArr('pantry');

function toggle(arr, id) {
  const i = arr.indexOf(id);
  if (i === -1) arr.push(id); else arr.splice(i, 1);
  return arr;
}

// ── CUSTOM ITEMS ──────────────────────────────────────────────────────────────

function getCustomItems() { const s = load(); return s.customItems || []; }
function setCustomItems(arr) { const s = load(); s.customItems = arr; save(s); }

function addCustomItem(name, qty, cat) {
  const items = getCustomItems();
  const id = 'c_' + Date.now();
  items.push({ id, name: name.trim(), qty: qty.trim() || '—', cat });
  setCustomItems(items);
  return id;
}

function allItems() { return [...ALL, ...getCustomItems()]; }

// ── DERIVED ───────────────────────────────────────────────────────────────────

let filterQ = '';

function visible() {
  const rm = removed(), pan = pantry();
  return allItems().filter(item =>
    !rm.includes(item.id) &&
    !pan.includes(item.id) &&
    (filterQ === '' || item.name.toLowerCase().includes(filterQ.toLowerCase()))
  );
}

// ── RENDER LIST ───────────────────────────────────────────────────────────────

function renderList() {
  const area  = document.getElementById('scrollArea');
  const chk   = checked();
  const pan   = pantry();
  const vis   = visible();

  if (vis.length === 0 && filterQ === '') {
    area.innerHTML = `<div class="empty">
      <div class="e-icon">🎉</div>
      <h3>List is empty</h3>
      <p>Reset via the ··· menu to start<br>a new week's shop.</p>
    </div>`;
    setProgress(0, 0);
    return;
  }

  if (vis.length === 0) {
    area.innerHTML = `<div class="empty">
      <div class="e-icon">🔍</div>
      <h3>No results</h3>
      <p>Nothing matches "${filterQ}"</p>
    </div>`;
    return;
  }

  let html = '';

  for (const [catKey, catMeta] of Object.entries(CATS)) {
    const items = vis.filter(i => i.cat === catKey);
    if (!items.length) continue;
    const doneCount = items.filter(i => chk.includes(i.id)).length;

    html += `<div class="cat-lbl">
      <span>${catMeta.icon} ${catMeta.label}</span>
      <span>${doneCount}/${items.length}</span>
    </div>`;

    for (const item of items) {
      const isDone   = chk.includes(item.id);
      const inPantry = pan.includes(item.id);
      const cls      = isDone ? 'done' : (inPantry ? 'pantry-stocked' : '');
      const cbTxt    = isDone ? '✓' : (inPantry ? '🏠' : '');
      html += `<div class="item ${cls}" ontouchend="tapItem(event,'${item.id}')" onclick="tapItem(event,'${item.id}')">
        <div class="cb">${cbTxt}</div>
        <span class="item-name">${item.name}</span>
        <span class="item-qty">${item.qty}</span>
      </div>`;
    }
  }

  area.innerHTML = html;
  const total = vis.length;
  const done  = vis.filter(i => chk.includes(i.id)).length;
  setProgress(done, total);
}

function setProgress(done, total) {
  const pct = total === 0 ? 0 : Math.round(done / total * 100);
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('progTxt').textContent  = `${done} / ${total} items`;
}

// ── RENDER PANTRY ─────────────────────────────────────────────────────────────

function renderPantry() {
  const area    = document.getElementById('scrollArea');
  const pan     = pantry();
  const customs = getCustomItems();
  let lastCat   = null;

  let html = `<div class="pan-intro">
    <h2>Your Pantry</h2>
    <p>Toggle items you already have at home — they disappear from your shopping list. Add anything extra below.</p>
  </div>`;

  // ── Standard items ──
  for (const item of ALL) {
    if (item.cat !== lastCat) {
      const m = CATS[item.cat];
      html += `<div class="cat-lbl">${m.icon} ${m.label}<span></span></div>`;
      lastCat = item.cat;
    }
    const on = pan.includes(item.id);
    html += `<div class="pan-item ${on ? 'on' : ''}" ontouchend="tapPantry(event,'${item.id}')" onclick="tapPantry(event,'${item.id}')">
      <div class="toggle"></div>
      <span class="pan-name">${item.name}</span>
      <span class="pan-qty">${item.qty}</span>
    </div>`;
  }

  // ── Custom items ──
  html += `<div class="cat-lbl">✏️ My Items<span>${customs.length}</span></div>`;

  if (customs.length === 0) {
    html += `<div class="pan-empty-custom">No custom items yet — add one below.</div>`;
  } else {
    for (const item of customs) {
      const on = pan.includes(item.id);
      html += `<div class="pan-item ${on ? 'on' : ''}" ontouchend="tapPantry(event,'${item.id}')" onclick="tapPantry(event,'${item.id}')">
        <div class="toggle"></div>
        <span class="pan-name">${item.name}</span>
        <span class="pan-qty">${item.qty}</span>
        <button class="del-btn" ontouchend="tapDeleteCustom(event,'${item.id}')" onclick="tapDeleteCustom(event,'${item.id}')">✕</button>
      </div>`;
    }
  }

  // ── Add item form ──
  html += `<div class="add-item-form">
    <div class="add-form-title">+ Add Item</div>
    <input id="addName" type="text" placeholder="Item name" autocomplete="off" autocorrect="off" spellcheck="false">
    <div class="add-row">
      <input id="addQty" type="text" placeholder="Qty (e.g. 1 jar)" autocomplete="off">
      <select id="addCat">
        <option value="protein">🥩 Protein</option>
        <option value="carbs">🌾 Carbs</option>
        <option value="veg">🥦 Veg</option>
        <option value="fats" selected>🫙 Fats & Extras</option>
      </select>
    </div>
    <button class="add-btn" onclick="submitAddItem()">Add to Pantry & List</button>
  </div>`;

  area.innerHTML = html;
}

function submitAddItem() {
  const nameEl = document.getElementById('addName');
  const qtyEl  = document.getElementById('addQty');
  const catEl  = document.getElementById('addCat');
  const name   = nameEl.value.trim();
  if (!name) { nameEl.focus(); return; }
  addCustomItem(name, qtyEl.value, catEl.value);
  renderPantry();
  // scroll to bottom so user sees new item
  document.getElementById('scrollArea').scrollTo({ top: 99999, behavior: 'smooth' });
}

// ── TAP HANDLERS (scroll-safe) ────────────────────────────────────────────────
// We track touchstart position and only fire if the finger moved < 8px,
// which means it was a tap not a scroll.

let touchStartX = 0, touchStartY = 0, touchMoved = false;

document.getElementById('scrollArea').addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  touchMoved  = false;
}, { passive: true });

document.getElementById('scrollArea').addEventListener('touchmove', () => {
  touchMoved = true;
}, { passive: true });

function tapItem(e, id) {
  if (touchMoved) return;
  e.preventDefault();
  setArr('checked', toggle(checked(), id));
  renderList();
}

function tapPantry(e, id) {
  if (touchMoved) return;
  e.preventDefault();
  setArr('pantry', toggle(pantry(), id));
  renderPantry();
}

function tapDeleteCustom(e, id) {
  if (touchMoved) return;
  e.preventDefault();
  e.stopPropagation();
  const customs = getCustomItems().filter(i => i.id !== id);
  setCustomItems(customs);
  // also remove from pantry/checked if present
  setArr('pantry',  getArr('pantry').filter(x => x !== id));
  setArr('checked', getArr('checked').filter(x => x !== id));
  renderPantry();
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────

function uncheckAll()    { setArr('checked', []); renderList(); }

function removeChecked() {
  const chk = checked(), rm = removed();
  setArr('removed', [...new Set([...rm, ...chk])]);
  setArr('checked', []);
  renderList();
}

function clearPantry() {
  if (!confirm('Clear all pantry stock?')) return;
  setArr('pantry', []);
  renderPantry();
}

function resetList()  { setArr('checked', []); setArr('removed', []); renderList(); }

function nukAll() {
  if (!confirm('Clear ALL data including pantry and custom items?')) return;
  localStorage.removeItem(LS);
  renderList();
  renderPantry();
}

function copyList() {
  const chk = checked(), vis = visible();
  let txt = 'WEEKLY SHOPPING LIST\n\n';
  for (const [catKey, meta] of Object.entries(CATS)) {
    const items = vis.filter(i => i.cat === catKey);
    if (!items.length) continue;
    txt += meta.label.toUpperCase() + '\n';
    items.forEach(i => { txt += (chk.includes(i.id) ? '✓ ' : '□ ') + i.name + '  ' + i.qty + '\n'; });
    txt += '\n';
  }
  if (navigator.clipboard) {
    navigator.clipboard.writeText(txt)
      .then(() => alert('Copied to clipboard!'))
      .catch(() => prompt('Your list:', txt));
  } else {
    prompt('Your list:', txt);
  }
}

function doFilter(v) { filterQ = v; renderList(); }

// ── TABS ──────────────────────────────────────────────────────────────────────

let currentTab = 'list';

function goTab(tab) {
  currentTab = tab;

  document.getElementById('tabList').classList.toggle('on',   tab === 'list');
  document.getElementById('tabPantry').classList.toggle('on', tab === 'pantry');
  document.getElementById('progWrap').style.display  = tab === 'list' ? '' : 'none';
  document.getElementById('srchWrap').style.display  = tab === 'list' ? '' : 'none';
  document.getElementById('listBot').style.display   = tab === 'list' ? 'flex' : 'none';
  document.getElementById('panBot').style.display    = tab === 'pantry' ? 'flex' : 'none';

  if (tab === 'list')   renderList();
  if (tab === 'pantry') renderPantry();
}

// ── MENU ──────────────────────────────────────────────────────────────────────

function openMenu()       { document.getElementById('menuOverlay').classList.add('open'); }
function closeMenu()      { document.getElementById('menuOverlay').classList.remove('open'); }
function overlayTap(e)    { if (e.target === document.getElementById('menuOverlay')) closeMenu(); }

// ── INIT ──────────────────────────────────────────────────────────────────────

renderList();

// Register a minimal service worker for offline support
if ('serviceWorker' in navigator) {
  const sw = `
    const CACHE = 'shop-v2';
    const ASSETS = ['./', './manifest.json', './icon.svg',
      'https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,300&family=DM+Mono:wght@400;500&display=swap'];
    self.addEventListener('install', e => e.waitUntil(
      caches.open(CACHE).then(c => c.addAll(ASSETS).catch(()=>{})).then(() => self.skipWaiting())
    ));
    self.addEventListener('fetch', e => e.respondWith(
      caches.match(e.request).then(r => r || fetch(e.request).catch(() => caches.match('./')))
    ));
  `;
  const blob = new Blob([sw], { type: 'application/javascript' });
  const url  = URL.createObjectURL(blob);
  navigator.serviceWorker.register(url, { scope: './' }).catch(() => {});
}
</script>
